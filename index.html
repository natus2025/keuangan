<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Keuangan</title>
    <style>
        /* CSS Tetap Sama Seperti Kode Anda Sebelumnya */
        * { box-sizing: border-box; }
        body { margin: 0; padding: 15px; font-family: Arial, sans-serif; background: #e8f5e9; color: #333; }
        .container { max-width: 1250px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,.12); }
        .header { text-align: center; border-bottom: 3px solid #00a651; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { margin: 0 0 5px; color: #00a651; font-size: 27px; }
        .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .card { padding: 18px; color: white; border-radius: 10px; text-align: center; }
        .card-in { background: #4caf50; }
        .card-out { background: #f44336; }
        .card-balance { background: #2196f3; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 9px; }
        th { background: #00a651; color: white; text-align: center; }
        .amount { text-align: right; font-weight: bold; }
        .income { color: #2e7d32; }
        .expense { color: #c62828; }
        .action-button { padding: 5px 8px; font-size: 11px; margin: 2px; cursor: pointer; border: none; color: white; border-radius: 4px; }
        .btn-edit { background: #ff9800; }
        .btn-delete { background: #f44336; }
        .btn-view { background: #2196f3; }
        /* Responsive & Print */
        @media print { .action-column, .action-cell, .form-title-row, .form-grid, .form-bottom, .button-row, .filter-zone, .pagination-zone, .summary { display: none !important; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>KLINIK PRATAMA ANDINI & PT NATUS</h1>
        <p>LAPORAN PEMASUKAN & PENGELUARAN HARIAN</p>
        <p id="tanggalHariIni"></p>
    </div>

    <!-- ... (Bagian Card Summary tetap sama) ... -->
    <div class="summary">
        <div class="card card-in"><h3>TOTAL PEMASUKAN</h3><p id="totalPemasukan">Rp 0</p></div>
        <div class="card card-out"><h3>TOTAL PENGELUARAN</h3><p id="totalPengeluaran">Rp 0</p></div>
        <div class="card card-balance"><h3>SALDO</h3><p id="totalSaldo">Rp 0</p></div>
    </div>

    <!-- ... (Bagian Form dan Filter tetap sama) ... -->
    <table id="tabelTransaksi">
        <thead>
            <tr>
                <th>No</th>
                <th>Tanggal</th>
                <th>Jam</th>
                <th>Jenis</th>
                <th>Keterangan</th>
                <th>Jumlah</th>
                <th>Bukti</th>
                <th>Dibuat Oleh</th>
                <th class="action-column">Aksi</th>
            </tr>
        </thead>
        <tbody id="tabelData">
            <tr><td colspan="9" class="loading">Memuat data...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwB-OFrwalmuLSZKBXFjpG4C0my-JWp3UB5_o_infoL1g48kkSfMyinn7z-ZqgwtHEd/exec";
    let data = [];
    let dataFilter = [];
    let halaman = 1;
    let jumlahBaris = 30;

    function rupiah(angka) { return "Rp " + Number(angka || 0).toLocaleString("id-ID"); }

    function formatTanggal(tanggal) {
        if (!tanggal) return "-";
        const parts = String(tanggal).split("-");
        return parts.length === 3 ? `${parts[2]}/${parts[1]}/${parts[0]}` : tanggal;
    }

    async function loadData() {
        try {
            const response = await fetch(GOOGLE_SCRIPT_URL + "?action=getData&database=klinik");
            const result = await response.json();
            data = Array.isArray(result.data) ? result.data : [];
            jalankanFilter();
        } catch (error) { console.error(error); }
    }

    function jalankanFilter() {
        // Logika filter tetap sama
        dataFilter = [...data]; 
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById("tabelData");

        // --- PERBAIKAN: URUTKAN DATA DARI YANG TERBARU ---
        dataFilter.sort((a, b) => {
            const dateA = new Date(`${a.tgl}T${a.jam || '00:00'}`);
            const dateB = new Date(`${b.tgl}T${b.jam || '00:00'}`);
            return dateB - dateA; 
        });

        tbody.innerHTML = "";
        
        // Render baris tabel
        dataFilter.forEach((item, index) => {
            const kelas = item.jenis === "Pemasukan" ? "income" : "expense";
            tbody.innerHTML += `
                <tr>
                    <td style="text-align:center">${index + 1}</td>
                    <td>${formatTanggal(item.tgl)}</td>
                    <td>${item.jam || "-"}</td>
                    <td class="${kelas}">${item.jenis}</td>
                    <td>${item.ket}</td>
                    <td class="amount ${kelas}">${rupiah(item.jumlah)}</td>
                    <td>${item.buktiData ? 'Ada' : '-'}</td>
                    <td>${item.pembuat || "-"}</td>
                    <td class="action-cell">
                        <button class="action-button btn-edit" onclick="editTransaksi(${index})">Edit</button>
                    </td>
                </tr>
            `;
        });
    }

    document.addEventListener("DOMContentLoaded", loadData);
</script>

</body>
</html>
